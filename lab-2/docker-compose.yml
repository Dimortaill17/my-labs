services:
  postgres:
    image: postgres:18
    container_name: author-db
    restart: unless-stopped
    env_file:
      - local.env
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U author_user -d authordb"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

volumes:
  postgres-data: